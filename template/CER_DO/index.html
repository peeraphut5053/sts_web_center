<style>
    .cer-do-page{
        background:#f4f7fb;
        border:1px solid #d7e0ea;
        border-radius:8px;
        padding:14px 14px 16px;
        margin-bottom:14px;
        box-shadow:0 8px 22px rgba(31,58,88,.08);
    }
    .cer-do-toolbar{
        display:flex;
        flex-wrap:wrap;
        align-items:flex-end;
        gap:10px;
        margin-bottom:12px;
    }
    .cer-do-title{
        flex:1 0 180px;
        min-width:180px;
        padding:4px 6px 0 0;
    }

    }
    .cer-do-filter{

    }
    .cer-do-filter .form-control{

    }

    }
    .cer-do-actions{
        flex:0 0 auto;
    }
    .cer-do-actions .btn{

        font-weight:600;
        border-radius:4px;

    }

        padding-right:3px;
    }
    .cer-do-table-wrap{
        background:#fff;
        border:1px solid #dbe4ee;
        border-radius:8px;
        padding:10px;
        box-shadow:0 6px 18px rgba(31,58,88,.06);
    }
    #tblReport{
        margin-bottom:0 !important;
    }
    .table thead th{
        text-align: center;
    }
    #tblReport.dataTable thead th,
    #tblReport.dataTable thead .sorting,
    #tblReport.dataTable thead .sorting_asc,
    #tblReport.dataTable thead .sorting_desc,
    #tblReport.dataTable thead .sorting_disabled,
    table.dataTable.fixedHeader-floating thead th,
    table.dataTable.fixedHeader-floating thead .sorting,
    table.dataTable.fixedHeader-floating thead .sorting_asc,
    table.dataTable.fixedHeader-floating thead .sorting_desc,
    table.dataTable.fixedHeader-floating thead .sorting_disabled,
    #tblModal thead th{
        background-color:#23384f !important;
        border-color:#1d3044;
        color:#fff;
        font-size:12px;
        font-weight:700;
        vertical-align:middle;
        white-space:nowrap;
    }
    #tblReport tbody td{
        vertical-align:middle;
        color:#24384d;
    }
    #tblReport tbody tr:hover td{
        background:#eef7ff;
    }

    .col-flt-page{
        padding-top:10px;
        font-weight: bold;
    }

    #tblReport tbody tr td a {
        cursor: pointer ;
        color:#0b78bd;
        font-weight:700;
        text-decoration:underline;
    }
    .dataTables_wrapper .dt-buttons .btn,
    .dataTables_wrapper .dt-buttons button{
        border-radius:4px;
        margin-right:5px;
    }
    .dataTables_wrapper .dataTables_info{
        color:#617386;
        padding-top:10px;
    }
    table.dataTable.fixedHeader-floating, table.dataTable.fixedHeader-locked {
        background-color: white;
        margin-top: 50px !important;
        margin-bottom: 0 !important;
    }

    .tr-row-cn td{
        color :red;
    }
    #tblModal {
        z-index:999999;
    }
    #myModal{
        display:none;
    }
    #myModal .modal-content{
        border:0;
        border-radius:8px;
        overflow:hidden;
        box-shadow:0 18px 45px rgba(24,42,60,.28);
    }
    #myModal .modal-header{
        background:#23384f;
        color:#fff;
        font-weight:700;
        border-bottom:0;
    }
    #myModal .close{
        color:#fff;
        opacity:.9;
        text-shadow:none;
    }
    #modalDetailLine{
        background:#f1f6fb;
        border:1px solid #d9e5ef;
        border-radius:6px;

        margin-bottom:10px;

    }
    #tblModal tbody td{

    }

        z-index:99999999 ;
    }
    @media (max-width: 767px){

        }

        .cer-do-filter,
        .cer-do-actions{
            width:100%;
            margin-bottom:8px;
        }
        .cer-do-actions .btn{

        }
        .cer-do-filter .input-group-addon{
            min-width:88px;
            font-size:12px;
        }

</style>

<script type="text/javascript">
    $(document).ready(function () {
        if ($('#selCust').length && $.fn.selectize) {
            $('#selCust').selectize({
                plugins: ['remove_button'],
                delimiter: ',',
                persist: false,
                create: function (input) {
                    return {
                        value: input,
                        text: input
                    }
                }
            });
        }
    });

    // $("#txtCerDate, #txtShipDate").val(GetToday());

    $("#txtCerDate, #txtShipDate").datepicker({
        dateFormat: 'yy-mm-dd',
    });
    $("#btnSearch").click(function () {
        loadData();
    });

    $(".txt-filter").on("keypress", function (e) {
        if (e.keyCode == 13) {
            loadData();
            return false; // prevent the button click from happening
        }
    });
    function loadData() {
        var txtCerDate = $("#txtCerDate").val();
        var txtShipDate = $("#txtShipDate").val();
        var txtDoNum = $("#txtDoNum").val();

        var OldHtml = $("#btnSearch").html();
        $.ajax({
            type: 'GET',
            url: "././module/CER_DO/data.php",
            contentType: "text/plain",
            dataType: 'json',
            beforeSend: function () {
                $("#btnSearch").prop("disabled", true).html("<i class='fa fa-spinner fa-spin'></i>&nbsp;Loading");
            },
            data: {
                load: 'ajax2',
                txtCerDate: txtCerDate,
                txtShipDate: txtShipDate,
                txtDoNum: txtDoNum,
            },
            success: function (data) {
                if ($.fn.DataTable && $.fn.DataTable.isDataTable('#tblReport')) {
                    $('#tblReport').DataTable().clear();
                }
                $('#tblReport').dataTable({
                    fixedHeader: true,
                    "aaData": data,
                    paging: false,
                    searching: false,
                    destroy: true,
                    scrollY: "400px",
                    "scrollX": true,
//                    "pageLength": 25,
                    "columns": [
                        {"data": "pickup_date_conv"},
                        {"data": "do_num", "className": "text-center"},
                        {"data": "do_seq", "className": "text-center"},
                        {"data": "cust_name"},
                        {"data": "item_desc", "width": "19%"},
                        {"data": "qty_conv", "className": "text-right"},
                        {"data": "Loc"},
                        {"data": "lots" ,"render" : function(data, type, row, meta){
                                  var ret = "";
                                if(row["CountLot"]==1){
                                    ret = row["lot1"] ;
                                }else{
                                     ret = row["lots"] ;
                                }
                                return ret ; 
                        }},
                        {"data": "CountLot", "className": "text-right",
                            "render": function (data, type, row, meta) {
                                var ret = "";
                                if (data <= 1) {
                                    ret = data;
                                } else {
                                    var thisId = "multiLot!!"
                                            + row["co_num"] + "!!"
                                            + row["Co_line"] + "!!"
                                            + row["do_num"] + "!!"
                                            + row["do_seq"] + "!!"
                                            + row["CountLot"] + "!!"
                                            + row["qty_conv"] + "!!"
                                            + row["item_desc"];
                                    ret = "<a id='" + thisId + "' OnClick='ShowMultiLot(this.id)'>" + data + "</a>";
                                }
                                return ret;
                            }},
                        {"data": "qty_shipped", "className": "text-right", "width": "5%",
                        }, 
                        {"data": "ship_date_conv", "className": "text-right"},
                            
                    ],
                    'dom': "<'row'<'col-md-5'B><'col-md-7 text-right col-flt-page'lf>>" +
                            "<'row'<'col-md-12'tr>>" +
                            "<'row'<'col-md-5 text-left'i><'col-sm-7 text-right'p>>",
                    buttons: [
                        {
                            extend: 'print',
                            text: "<i class='fa fa-print'></i>&nbsp;Print",
                            title: ''
                        },
                        {
                            extend: 'excel',
                            text: "<i class='fa fa-file-excel'></i>&nbsp;Excel",
                            title: ''
                        },
                    ]
                });

                $('#tblReport').loading("stop");
                $("#btnSearch").prop("disabled", false).html(OldHtml);
            },
            error: function (e) {
                console.log("There was an error with your request...");
                console.log("error: " + JSON.stringify(e));
                $("#btnSearch").prop("disabled", false).html(OldHtml);
            }
        });
    }

    function ShowMultiLot(thisid) {
        var txtCerDate = $("#txtCerDate").val();
        var TarGetTableId = "tblModal";
        $("#myModal").modal('show');
        $("#" + TarGetTableId).loading();
        $("#tbodyModal").empty();
        //======== Table ==========


        //======== Param ==========
        var ArrThisId = thisid.split("!!");
        var CoNum = ArrThisId[1];
        var CoLine = ArrThisId[2];
        var DoNum = ArrThisId[3];
        var DoLine = ArrThisId[4];
        var LotCount = ArrThisId[5];
        var QtyShipped = ArrThisId[6];
        var Item = ArrThisId[7];
        $("#modalDetailLine").html("DO : " + DoNum + " | Line : " + DoLine + " | Item : " + Item + " | <br>Shipped : " + QtyShipped + " | Use LOT : " + LotCount);
        //========================
        $.ajax({
            type: 'GET',
            url: "././module/CER_DO/data.php",
            contentType: "text/plain",
            dataType: 'json',
            beforeSend: function () {
                $("#" + TarGetTableId).loading();
            },
            data: {
                load: 'MultiLot',
                CoNum: CoNum,
                CoLine: CoLine,
                txtCerDate: txtCerDate,
            },
            success: function (data) {
                var lineTable = "";
                var RowIndex = 0;
                $.each(data, function (index, row) {
                    RowIndex++;
                    $("#tbodyModal").append("<tr><td align='center'>" + RowIndex + "</td><td align='center'>" + row["lot"] + "</td><td align='right'>" + row["qty_conv"] + "</td></tr>");
                });
                $('#' + TarGetTableId).loading("stop");
            },
            error: function (e) {
                console.log("There was an error with your request...");
                console.log("error: " + JSON.stringify(e));
            }
        });

    }
</script>
