<div class="ready-stock-page">
    <div class="ready-stock-toolbar">
        <div class="ready-stock-header-row">
            <div class="ready-stock-heading">
                <span class="ready-stock-title-icon"><i class="fa fa-cubes"></i></span>
                <h1>รายงานสต็อคสินค้า</h1>
            </div>
            <div class="ready-stock-summary-wrap">
                <div class="ready-stock-summary" id="readyStockSummary">0 rows</div>
            </div>
        </div>
        <div class="row ready-stock-actions">
            <div class="col-lg-4 col-md-4 col-sm-6 col-xs-12">
                <div class="input-group">
                    <div class="input-group-addon">Item</div>
                    <input type="text" class="form-control" id="item" autocomplete="off" placeholder="All item">
                </div>
            </div>
            <div class="col-lg-4 col-md-4 col-sm-6 col-xs-12">
                <div class="input-group">
                    <div class="input-group-addon">Location</div>
                    <input type="text" class="form-control" id="loc" autocomplete="off" placeholder="All location">
                </div>
            </div>
            <div class="col-lg-4 col-md-4 col-sm-12 col-xs-12">
                <button id="btnSearch" class="btn btn-info">
                    <i class="fa fa-search"></i>&nbsp;Search
                </button>
                <button id="btnClear" class="btn btn-default" title="Clear">
                    <i class="fa fa-refresh"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="ready-stock-table-wrap" id="divReport">
        <table class="table table-condensed table-bordered table-striped" id="tblReadyStock" style="width:100%;">
            <thead>
                <tr>
                    <th>item</th>
                    <th>unit_weight</th>
                    <th>qty_on_hand</th>
                    <th>loc</th>
                    <th>description</th>
                    <th>lot</th>
                    <th>sts_no</th>
                    <th>city</th>
                    <th>tag_status</th>
                    <th>detail</th>
                    <th>tag</th>
                    <th>createdate</th>
                    <th>uf_market</th>
                    <th>itemType</th>
                    <th>ready</th>
                </tr>
            </thead>
        </table>
    </div>
</div>

<script type="text/javascript">
    var readyStockTable = null;
    var readyStockUrl = "././module/RPT_READY_STOCK/data.php";

    renderReadyStockTable([]);

    $("#btnSearch").click(function () {
        loadReadyStock();
    });

    $("#btnClear").click(function () {
        $("#item").val("");
        $("#loc").val("");
        renderReadyStockTable([]);
        $("#readyStockSummary").text("0 rows");
    });

    $(window).resize(function () {
        if (readyStockTable) {
            adjustReadyStockTable();
        }
    });

    $("#item,#loc").keypress(function (e) {
        if (e.which == 13) {
            loadReadyStock();
        }
    });

    function loadReadyStock() {
     

        var oldButton = $("#btnSearch").html();
        $("#btnSearch").html("<i class='fa fa-spinner fa-spin'></i>&nbsp;Loading");
        $("#tblReadyStock").loading();

        $.ajax({
            type: "GET",
            url: readyStockUrl,
            timeout: 120000,
            dataType: "json",
            data: {
                load: "ajax",
                item: $("#item").val(),
                loc: $("#loc").val()
            },
            success: function (data) {
                if (data && data.success === false) {
                    alert(data.message);
                    data = [];
                }

                renderReadyStockTable(data || []);
                $("#readyStockSummary").text(addCommas((data || []).length) + " rows");
                $("#tblReadyStock").loading("stop");
                $("#btnSearch").html(oldButton);
                adjustReadyStockTable();
            },
            error: function (e) {
                console.log("Ready stock report error", e);
                $("#tblReadyStock").loading("stop");
                $("#btnSearch").html(oldButton);
                alert("Cannot load ready stock report");
            }
        });
    }

    function renderReadyStockTable(data) {
        if ($.fn.DataTable.isDataTable("#tblReadyStock")) {
            $("#tblReadyStock").DataTable().clear().destroy();
        }

        readyStockTable = $("#tblReadyStock").DataTable({
            aaData: data,
            autoWidth: false,
            paging: true,
            pageLength: 100,
            deferRender: true,
            searching: true,
            scrollY: "calc(100vh - 275px)",
            scrollX: true,
            scrollCollapse: true,
            scroller: true,
            fixedHeader: false,
            destroy: true,
            ordering: true,
            order: [],
            processing: true,
            columnDefs: [
                { targets: "_all", defaultContent: "" }
            ],
            columns: [
                { data: "item", className: "text-left" },
                {
                    data: "unit_weight",
                    className: "text-right",
                    render: function (data) {
                        return formatNumber(data, 4);
                    }
                },
                {
                    data: "qty_on_hand",
                    className: "text-right",
                    render: function (data) {
                        return formatNumber(data, 4);
                    }
                },
                { data: "loc", className: "text-center" },
                { data: "description", className: "text-left" },
                { data: "lot", className: "text-left" },
                { data: "sts_no", className: "text-center" },
                { data: "city", className: "text-center" },
                {
                    data: "tag_status",
                    className: "text-center",
                    render: function (data) {
                        var status = data || "";
                        var className = status == "Good" ? "tag-status-good" : (status == "Fix" ? "tag-status-fix" : "");
                        return "<span class='" + className + "'>" + status + "</span>";
                    }
                },
                { data: "detail", className: "text-left" },
                { data: "tag", className: "text-center" },
                {
                    data: "createdate",
                    className: "text-center",
                    render: function (data) {
                        return formatDateOnly(data);
                    }
                },
                { data: "uf_market", className: "text-center" },
                { data: "itemType", className: "text-center" },
                { data: "ready", className: "text-center" }
            ],
            dom: "<'row'<'col-md-5'B><'col-md-7 text-right'f>>" +
                "<'row'<'col-md-12'tr>>" +
                "<'row'<'col-md-12 text-left'i>>",
            buttons: [
                {
                    extend: "print",
                    className: "btn btn-ready-print",
                    text: "<i class='fa fa-print'></i>&nbsp;Print",
                    title: "Ready Stock Report"
                },
                {
                    className: "btn btn-ready-excel",
                    text: "<i class='fa fa-file-excel-o'></i>&nbsp;Excel",
                    action: function () {
                        exportReadyStockCsv();
                    }
                }
            ]
        });
        setTimeout(function () {
            adjustReadyStockTable();
        }, 100);
    }

    function adjustReadyStockTable() {
        if (readyStockTable) {
            readyStockTable.columns.adjust().draw(false);
        }
    }

    function exportReadyStockCsv() {
        var url = readyStockUrl +
            "?load=exportCsv" +
            "&item=" + encodeURIComponent($("#item").val()) +
            "&loc=" + encodeURIComponent($("#loc").val());
        window.open(url, "_blank");
    }

    function formatNumber(value, digit) {
        var number = parseFloat(value);
        if (isNaN(number)) {
            return value || "";
        }
        return addCommas(number.toFixed(digit));
    }

    function formatDateOnly(value) {
        if (!value) {
            return "";
        }
        return value.toString().substring(0, 10);
    }
</script>
